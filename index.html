<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elsie's Spark - Creative Drawing App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <button id="btn-menu" title="Toggle toolbar" aria-label="Menu">
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/></svg>
      </button>
      <h1 id="app-title">Elsie's Spark</h1>
      <div id="daily-prompt">
        <span id="prompt-label">Prompt</span>
        <span id="prompt-text"></span>
        <button id="prompt-refresh" title="New prompt">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3v5h-5"/><path d="M3 10a7 7 0 0 1 12.3-4.5L17 8"/><path d="M3 17v-5h5"/><path d="M17 10a7 7 0 0 1-12.3 4.5L3 12"/></svg>
        </button>
      </div>
      <div id="top-actions">
        <button id="btn-new" title="New canvas">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="14" height="14" rx="2"/><line x1="10" y1="7" x2="10" y2="13"/><line x1="7" y1="10" x2="13" y2="10"/></svg>
          <span class="btn-label-mobile-hide">New</span>
        </button>
        <button id="btn-save" title="Save project (Ctrl+S)">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 17H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v7a2 2 0 0 1-2 2Z"/><path d="M13 17v-5H7v5"/><path d="M7 3v3h5"/></svg>
          <span class="btn-label-mobile-hide">Save</span>
        </button>
        <button id="btn-load" title="Load project">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 15v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/><path d="M7 10l3 3 3-3"/><line x1="10" y1="3" x2="10" y2="13"/></svg>
          <span class="btn-label-mobile-hide">Load</span>
        </button>
        <button id="btn-export" title="Export as PNG">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 14l4 4 4-4"/><line x1="10" y1="2" x2="10" y2="18"/></svg>
          <span class="btn-label-mobile-hide">Export</span>
        </button>
      </div>
    </header>

    <div id="main-area">
      <aside id="toolbar">
        <section class="tool-section">
          <h3>Brushes</h3>
          <div id="brush-list">
            <button class="brush-btn active" data-brush="pen" title="Pen">
              <svg viewBox="0 0 24 24"><path d="M4 20 L17 7 L20 4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="4" cy="20" r="1.2" fill="currentColor"/></svg>
            </button>
            <button class="brush-btn" data-brush="marker" title="Marker">
              <svg viewBox="0 0 24 24"><rect x="7" y="3" width="6" height="15" rx="3" fill="currentColor" opacity="0.35" transform="rotate(-30 10 12)"/><line x1="6" y1="19" x2="16" y2="5" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/></svg>
            </button>
            <button class="brush-btn" data-brush="eraser" title="Eraser">
              <svg viewBox="0 0 24 24"><path d="M18 6 L8 16 L4 20 L10 20 L20 10 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><line x1="4" y1="20" x2="12" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <button class="brush-btn" data-brush="sprinkles" title="Sprinkles">
              <svg viewBox="0 0 24 24"><circle cx="7" cy="7" r="2" fill="currentColor" opacity="0.9"/><circle cx="17" cy="5" r="1.5" fill="currentColor" opacity="0.7"/><circle cx="12" cy="13" r="2.5" fill="currentColor" opacity="0.8"/><circle cx="19" cy="16" r="1.2" fill="currentColor" opacity="0.6"/><circle cx="6" cy="18" r="1.8" fill="currentColor" opacity="0.75"/><rect x="14" y="10" width="4" height="1.5" rx="0.75" fill="currentColor" transform="rotate(30 16 11)" opacity="0.5"/></svg>
            </button>
            <button class="brush-btn" data-brush="vine" title="Vine">
              <svg viewBox="0 0 24 24"><path d="M4 20 Q8 10 12 14 Q16 18 20 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><ellipse cx="8" cy="10" rx="2" ry="1.2" fill="currentColor" opacity="0.5" transform="rotate(-30 8 10)"/><ellipse cx="16" cy="8" rx="2" ry="1.2" fill="currentColor" opacity="0.5" transform="rotate(20 16 8)"/></svg>
            </button>
            <button class="brush-btn" data-brush="fairylights" title="Fairy Lights">
              <svg viewBox="0 0 24 24"><path d="M2 10 Q7 14 12 10 Q17 6 22 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2"/><circle cx="5" cy="12" r="2.5" fill="currentColor" opacity="0.6"/><circle cx="12" cy="8" r="2.5" fill="currentColor" opacity="0.5"/><circle cx="19" cy="11" r="2.5" fill="currentColor" opacity="0.7"/></svg>
            </button>
          </div>
        </section>

        <section class="tool-section">
          <h3>Size</h3>
          <input type="range" id="brush-size" min="1" max="80" value="4">
          <span id="brush-size-label">4 px</span>
        </section>

        <section class="tool-section">
          <h3>Opacity</h3>
          <input type="range" id="brush-opacity" min="5" max="100" value="100">
          <span id="brush-opacity-label">100%</span>
        </section>

        <section class="tool-section">
          <h3>Color</h3>
          <input type="color" id="color-picker" value="#222222">
          <div id="color-swatches"></div>
        </section>

        <section class="tool-section">
          <h3>Layers</h3>
          <div id="layer-controls">
            <button id="btn-add-layer" title="Add layer">+ Add Layer</button>
          </div>
          <ul id="layer-list"></ul>
        </section>

        <section class="tool-section">
          <h3>Import</h3>
          <button id="btn-import-image" title="Import tracing image">
            <svg viewBox="0 0 20 20" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:4px"><rect x="2" y="2" width="16" height="16" rx="2"/><circle cx="7" cy="7" r="2"/><path d="M18 14l-4-4-8 8"/></svg>
            Trace Image
          </button>
          <input type="file" id="file-import" accept="image/*" hidden>
          <button id="btn-clear-trace" title="Remove tracing image" hidden>Clear Trace</button>
        </section>

        <section class="tool-section">
          <h3>Stickers</h3>
          <div id="sticker-list"></div>
        </section>
      </aside>

      <div id="canvas-area">
        <div id="canvas-container">
          <canvas id="trace-canvas"></canvas>
          <canvas id="preview-canvas"></canvas>
        </div>
        <!-- Floating controls for sticker mode (touch devices) -->
        <div id="sticker-touch-controls" class="hidden">
          <button id="sticker-shrink" title="Smaller" aria-label="Smaller">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="10" x2="15" y2="10"/></svg>
          </button>
          <button id="sticker-grow" title="Bigger" aria-label="Bigger">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="10" y1="5" x2="10" y2="15"/><line x1="5" y1="10" x2="15" y2="10"/></svg>
          </button>
          <button id="sticker-rotate-left" title="Rotate left" aria-label="Rotate left">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v5h5"/><path d="M3 8a7 7 0 1 1 1.5 4.5"/></svg>
          </button>
          <button id="sticker-rotate-right" title="Rotate right" aria-label="Rotate right">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 3v5h-5"/><path d="M17 8a7 7 0 1 0-1.5 4.5"/></svg>
          </button>
          <button id="sticker-cancel" title="Cancel" aria-label="Cancel sticker">
            <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="5" x2="15" y2="15"/><line x1="15" y1="5" x2="5" y2="15"/></svg>
          </button>
        </div>
      </div>
    </div>

    <footer id="bottom-bar">
      <div id="undo-redo">
        <button id="btn-undo" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h10a4 4 0 0 1 0 8H9"/><path d="M6 4L3 7l3 3"/></svg>
        </button>
        <button id="btn-redo" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 7H7a4 4 0 0 0 0 8h4"/><path d="M14 4l3 3-3 3"/></svg>
        </button>
      </div>
      <div id="zoom-controls">
        <button id="btn-zoom-out" title="Zoom out">
          <svg viewBox="0 0 20 20" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="10" x2="15" y2="10"/></svg>
        </button>
        <span id="zoom-label">100%</span>
        <button id="btn-zoom-in" title="Zoom in">
          <svg viewBox="0 0 20 20" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="10" y1="5" x2="10" y2="15"/><line x1="5" y1="10" x2="15" y2="10"/></svg>
        </button>
        <button id="btn-zoom-fit" title="Fit to screen">Fit</button>
      </div>
      <div id="canvas-dims">
        <label>W <input type="number" id="canvas-width" value="1200" min="100" max="4000"></label>
        <label>H <input type="number" id="canvas-height" value="800" min="100" max="4000"></label>
        <button id="btn-resize">Apply</button>
      </div>
    </footer>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
